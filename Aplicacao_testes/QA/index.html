<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QA · Quociente do Espectro do Autismo | Equilibrium</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    /* ━━━ RESET E BASE ━━━ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(124,58,237,.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(99,102,241,.04) 0%, transparent 50%),
        radial-gradient(circle at 50% 80%, rgba(139,92,246,.03) 0%, transparent 50%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 L55 17.5 L55 42.5 L30 55 L5 42.5 L5 17.5 Z' fill='none' stroke='%237c3aed' stroke-opacity='0.04' stroke-width='1'/%3E%3C/svg%3E");
      background-size: 100% 100%, 100% 100%, 100% 100%, 60px 60px;
      color: #1e293b;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ━━━ VARIÁVEIS DE COR — QA usa roxo/índigo ━━━ */
    :root {
      --qa-accent:       #7c3aed;
      --qa-accent-light: #ede9fe;
      --qa-accent-dark:  #5b21b6;
      --text:            #1e293b;
      --text-secondary:  #64748b;
      --border:          #e2e8f0;
    }

    /* ━━━ LAYOUT PRINCIPAL ━━━ */
    .p-shell {
      max-width: 820px;
      margin: 0 auto;
      padding: 24px 16px 110px;
    }

    /* ── Cabeçalho ── */
    .p-header {
      background: linear-gradient(135deg, #fff 0%, #faf5ff 100%);
      border-radius: 16px;
      padding: 18px 24px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(124,58,237,.08), 0 1px 4px rgba(0,0,0,.04);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border: 1px solid rgba(124,58,237,.08);
    }
    .p-brand { display: flex; align-items: center; gap: 12px; }
    .p-logo  { height: 36px; }
    .p-brand-name { font-weight: 800; font-size: 15px; color: #1e293b; }
    .p-brand-sub  { font-size: 11px; color: #64748b; }
    .p-test { text-align: right; }
    .p-test-name  { font-weight: 700; font-size: 16px; color: var(--qa-accent); }
    .p-test-count { font-size: 12px; color: #94a3b8; margin-top: 2px; }

    /* ── Barra de progresso ── */
    .p-progress-bar {
      height: 5px;
      background: #e2e8f0;
      border-radius: 4px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .p-progress-fill {
      height: 100%;
      background: var(--qa-accent);
      width: 0%;
      transition: width .35s ease;
      border-radius: 4px;
    }

    /* ── Card principal ── */
    .p-card {
      background: #fff;
      border-radius: 16px;
      padding: 28px 28px 32px;
      box-shadow: 0 4px 24px rgba(124,58,237,.06), 0 1px 4px rgba(0,0,0,.04);
      border: 1px solid rgba(124,58,237,.06);
    }

    /* ── Campos do paciente ── */
    .p-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 540px) { .p-fields { grid-template-columns: 1fr; } }
    .p-field label {
      display: block;
      font-size: 10.5px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 6px;
    }
    .p-field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: #1e293b;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      background: #fafcff;
    }
    .p-field input:focus {
      border-color: var(--qa-accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--qa-accent) 12%, transparent);
      background: #fff;
    }

    /* ── Divisor e heading ── */
    .p-divider {
      border: none;
      border-top: 1.5px solid #f1f5f9;
      margin: 24px 0;
    }
    .p-items-heading {
      font-size: 11px;
      font-weight: 800;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 20px;
    }

    /* ━━━ ITENS ━━━ */
    .item {
      padding: 16px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .item:last-child { border-bottom: none; }
    .item.respondido .top { color: #475569; }
    .top {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .qid {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--qa-accent-light);
      color: var(--qa-accent-dark);
      font-size: 11px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .item.respondido .qid {
      background: var(--qa-accent);
      color: #fff;
    }
    .txt {
      font-size: 14.5px;
      color: #1e293b;
      line-height: 1.55;
      flex: 1;
    }

    /* Opções de resposta — grade 2×2 */
    .opts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    @media (max-width: 480px) { .opts { grid-template-columns: 1fr; } }

    .opt {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      font-size: 13.5px;
      color: #374151;
      user-select: none;
    }
    .opt:hover { border-color: var(--qa-accent); background: var(--qa-accent-light); }
    .opt.selecionada {
      border-color: var(--qa-accent);
      background: var(--qa-accent-light);
      color: var(--qa-accent-dark);
      font-weight: 700;
    }
    .opt input[type=radio] { display: none; }

    /* Subescala tag — oculta no modo paciente */
    .tag-subescala { display: none; }

    /* ── Rodapé fixo ── */
    .p-footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(135deg, #fff 0%, #faf5ff 100%);
      border-top: 1.5px solid rgba(124,58,237,.1);
      padding: 13px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      z-index: 200;
      box-shadow: 0 -4px 24px rgba(124,58,237,.08);
    }
    .p-footer-info { font-size: 13px; color: #64748b; }
    .p-footer-info strong { color: #1e293b; font-weight: 700; }

    /* Botão Enviar */
    .btn-enviar {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--qa-accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 14px color-mix(in srgb, var(--qa-accent) 35%, transparent);
      letter-spacing: .01em;
      white-space: nowrap;
    }
    .btn-enviar:hover   { opacity: .88; transform: translateY(-1px); }
    .btn-enviar:active  { transform: translateY(0); opacity: 1; }
    .btn-enviar:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
  </style>
</head>
<body>

  <!-- ━━ CONTEÚDO PRINCIPAL ━━ -->
  <div class="p-shell" id="appShell">

    <!-- Cabeçalho -->
    <div class="p-header">
      <div class="p-brand">
        <img src="/logo.png" alt="Equilibrium" class="p-logo"
             onerror="this.style.display='none'">
        <div>
          <div class="p-brand-name">Equilibrium</div>
          <div class="p-brand-sub">Neuropsicologia</div>
        </div>
      </div>
      <div class="p-test">
        <div class="p-test-name">QA — Quociente do Autismo</div>
        <div class="p-test-count">
          Respondidos: <strong id="pillAnswered">0/50</strong>
        </div>
      </div>
    </div>

    <!-- Barra de progresso -->
    <div class="p-progress-bar">
      <div class="p-progress-fill" id="patientProgressFill"></div>
    </div>

    <!-- Card principal -->
    <div class="p-card">

      <!-- Dados do paciente -->
      <div class="p-fields">
        <div class="p-field">
          <label>Nome completo</label>
          <input id="paciente" type="text" placeholder="Nome completo" autocomplete="name" />
        </div>
        <div class="p-field">
          <label>CPF</label>
          <input id="cpf" type="text" placeholder="000.000.000-00" autocomplete="off" />
        </div>
        <div class="p-field">
          <label>Data de Nascimento</label>
          <input id="dataNascimento" type="date" />
        </div>
        <div class="p-field">
          <label>Data da avaliação</label>
          <input id="data" type="date" />
        </div>
        <div class="p-field" style="grid-column: 1 / -1;">
          <label>Respondente / Relação com o paciente</label>
          <input id="respondente" type="text" placeholder='Ex: "O próprio paciente", "Mãe", "Pai"' autocomplete="off" />
        </div>
      </div>

      <hr class="p-divider" />
      <div class="p-items-heading">Por favor, responda todos os itens abaixo</div>

      <!-- Itens gerados pelo JS -->
      <div id="itens"></div>

    </div>
  </div><!-- /p-shell -->

  <!-- ━━ RODAPÉ FIXO ━━ -->
  <div class="p-footer">
    <div class="p-footer-info">
      Respondidos: <strong id="footerAnswered">0</strong>
      de <strong>50</strong>
    </div>
    <button class="btn-enviar" id="btnEnviar" type="button">
      📤 Enviar Respostas
    </button>
  </div>

  <!-- ━━ RELATÓRIO OCULTO ━━ -->
  <div id="repOverlay" style="display:none; position:absolute; left:-99999px; width:800px; background:#fff; font-family:'DM Sans',Arial,sans-serif;">
    <div id="repFrame"></div>
  </div>

  <!-- SDKs do Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- Configurações do Sistema -->
  <script src="/js/firebase-config.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/patient-guard-silent.js"></script>
  <script src="/js/integration.js"></script>

  <script>
  // ═══════════════════════════════════════════════════════════════════════
  // QA — QUOCIENTE DO ESPECTRO DO AUTISMO (AQ)
  // Baron-Cohen, Wheelwright, Skinner, Martin & Clubley (2001)
  // Versão adultos — 50 itens — correção binária
  // ═══════════════════════════════════════════════════════════════════════

  const URL_DO_GOOGLE_SCRIPT = "https://script.google.com/macros/s/AKfycbwqbFoQmDvmTpu-zmKRG2kT4P2FaVn2BIRRHaAJg3gaNakbLcv3cgtpBlLY5p2M2oEWjQ/exec";

  // ── Gabarito de correção ─────────────────────────────────────────────
  // Grupo A: pontua se CONCORDA (CT ou CP)
  const GRUPO_A = new Set([2,4,5,6,7,9,12,13,16,18,19,20,21,22,23,26,33,35,39,41,42,43,45,46]);
  // Grupo B: pontua se DISCORDA (DP ou DT)
  const GRUPO_B = new Set([1,3,8,10,11,14,15,17,24,25,27,28,29,30,31,32,34,36,37,38,40,44,47,48,49,50]);

  // ── Subescalas ───────────────────────────────────────────────────────
  const SUBESCALAS = {
    "Habilidade Social":       [1,11,13,15,22,36,44,45,47,48],
    "Troca de Atenção":        [2,4,10,16,29,32,34,37,46,49],
    "Atenção aos Detalhes":    [5,6,9,12,19,23,28,39,41,43],
    "Comunicação":             [7,17,18,26,27,31,33,35,38,42],
    "Imaginação":              [3,8,14,20,21,24,25,40,50]
  };

  // ── Faixas de interpretação ──────────────────────────────────────────
  function interpretarTotal(total) {
    if (total <= 10) return { faixa: "Baixa", cor: "#16a34a", bg: "#dcfce7", desc: "Pontuação baixa (comum na população geral)" };
    if (total <= 21) return { faixa: "Média", cor: "#0891b2", bg: "#cffafe", desc: "Pontuação média da população geral" };
    if (total <= 25) return { faixa: "Acima da média", cor: "#d97706", bg: "#fef3c7", desc: "Ligeiramente acima da média" };
    if (total <= 31) return { faixa: "Limítrofe", cor: "#ea580c", bg: "#ffedd5", desc: "Pontuação limítrofe — pode indicar alguns traços" };
    return { faixa: "Clinicamente Significativa", cor: "#dc2626", bg: "#fee2e2", desc: "Pontuação clinicamente significativa (≥ 32)" };
  }

  // ── Itens do questionário ─────────────────────────────────────────────
  const ITENS = [
    { id:  1, texto: "Prefiro fazer coisas com outras pessoas do que sozinho(a)." },
    { id:  2, texto: "Prefiro fazer as coisas sempre da mesma maneira." },
    { id:  3, texto: "Quando tento imaginar uma coisa, tenho muita facilidade em criar uma imagem na minha mente." },
    { id:  4, texto: "Com frequência fico tão absorvido(a) com uma coisa que esqueço todo o resto." },
    { id:  5, texto: "Frequentemente noto pequenos ruídos que outras pessoas não ouvem." },
    { id:  6, texto: "Costumo prestar atenção aos números das placas dos automóveis ou a outras sequências de informação do mesmo tipo." },
    { id:  7, texto: "As outras pessoas com frequência me dizem que falei algo indelicado, apesar de eu achar que fui delicado(a)." },
    { id:  8, texto: "Quando leio uma história, consigo imaginar facilmente a aparência dos personagens." },
    { id:  9, texto: "Sou fascinado por datas." },
    { id: 10, texto: "Quando estou em grupo, tenho facilidade em seguir várias conversas ao mesmo tempo." },
    { id: 11, texto: "Tenho facilidade em compreender situações sociais." },
    { id: 12, texto: "Tenho tendência a notar detalhes que os outros não reparam." },
    { id: 13, texto: "Prefiro ir a uma biblioteca do que a uma festa." },
    { id: 14, texto: "Tenho facilidade em inventar histórias." },
    { id: 15, texto: "Tenho maior tendência a me aproximar de pessoas do que de coisas." },
    { id: 16, texto: "Tenho tendência a ter interesses fortes e fico incomodado(a) se não posso me dedicar a eles." },
    { id: 17, texto: "Gosto de bater papo." },
    { id: 18, texto: "Quando estou falando, as outras pessoas têm dificuldade em tomar a palavra." },
    { id: 19, texto: "Os números me fascinam." },
    { id: 20, texto: "Quando leio uma história, sinto dificuldade em entender as intenções dos personagens." },
    { id: 21, texto: "Não aprecio ler livros de ficção." },
    { id: 22, texto: "Tenho dificuldade em fazer novos amigos." },
    { id: 23, texto: "Vejo constantemente padrões nas coisas que me rodeiam." },
    { id: 24, texto: "Prefiro ir ao teatro do que ir a um museu." },
    { id: 25, texto: "Não fico incomodado(a) se minha rotina diária for alterada." },
    { id: 26, texto: "Com frequência sinto que não sei manter uma conversa." },
    { id: 27, texto: "Tenho facilidade em \"ler nas entrelinhas\" quando falam comigo." },
    { id: 28, texto: "Geralmente me concentro mais no todo do que nos detalhes." },
    { id: 29, texto: "Não sou muito bom/boa em lembrar números de telefone." },
    { id: 30, texto: "Geralmente não reparo nas pequenas mudanças de uma situação ou na aparência de uma pessoa." },
    { id: 31, texto: "Consigo dizer quando a pessoa com quem estou conversando fica entediada." },
    { id: 32, texto: "Consigo facilmente fazer mais do que uma coisa ao mesmo tempo." },
    { id: 33, texto: "Quando falo no telefone, não tenho a certeza quando é a minha vez de falar." },
    { id: 34, texto: "Gosto de fazer as coisas de forma espontânea." },
    { id: 35, texto: "Com frequência sou o(a) último(a) que entende uma piada." },
    { id: 36, texto: "Tenho facilidade em entender o que uma pessoa está pensando ou sentindo apenas olhando para o seu rosto." },
    { id: 37, texto: "Se sou interrompido(a), consigo rapidamente voltar ao que estava fazendo." },
    { id: 38, texto: "Sou bom/boa de papo." },
    { id: 39, texto: "Os outros frequentemente me dizem que eu insisto muito nas mesmas coisas." },
    { id: 40, texto: "Quando era criança, gostava de brincar de faz-de-conta com as outras crianças." },
    { id: 41, texto: "Gosto de colecionar informação sobre categorias de coisas (p. ex., tipos de carros, de aves, de trens, de plantas, etc.)." },
    { id: 42, texto: "Tenho dificuldade de me imaginar na pele de outra pessoa." },
    { id: 43, texto: "Gosto de planejar com cuidado todas as atividades em que participo." },
    { id: 44, texto: "Aprecio eventos sociais." },
    { id: 45, texto: "Tenho dificuldade em entender as intenções das outras pessoas." },
    { id: 46, texto: "Situações novas me deixam ansioso(a)." },
    { id: 47, texto: "Gosto de conhecer pessoas novas." },
    { id: 48, texto: "Tenho uma postura conciliadora em situações de interação social." },
    { id: 49, texto: "Tenho dificuldade em lembrar o dia de aniversário dos outros." },
    { id: 50, texto: "Tenho muita facilidade em brincar de faz-de-conta com as crianças." }
  ];

  const LABELS = {
    CT: "Concordo totalmente",
    CP: "Concordo parcialmente",
    DP: "Discordo parcialmente",
    DT: "Discordo totalmente"
  };

  // ── Renderizar itens ─────────────────────────────────────────────────
  function renderItens() {
    const container = document.getElementById("itens");
    container.innerHTML = "";

    ITENS.forEach(item => {
      const div = document.createElement("div");
      div.className = "item";
      div.dataset.id = item.id;

      div.innerHTML = `
        <div class="top">
          <div class="qid">${item.id}</div>
          <div class="txt">${escHtml(item.texto)}</div>
        </div>
        <div class="opts">
          ${["CT","CP","DP","DT"].map(v => `
            <label class="opt">
              <input type="radio" name="q${item.id}" value="${v}" />
              <span>${escHtml(LABELS[v])}</span>
            </label>
          `).join("")}
        </div>
      `;

      div.addEventListener("change", (e) => {
        div.classList.add("respondido");
        div.querySelectorAll(".opt").forEach(o => o.classList.remove("selecionada"));
        e.target.closest(".opt")?.classList.add("selecionada");
        atualizarProgresso();
      });

      container.appendChild(div);
    });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&#039;");
  }

  // ── Progresso ────────────────────────────────────────────────────────
  function atualizarProgresso() {
    let answered = 0;
    ITENS.forEach(item => {
      if (document.querySelector(`input[name="q${item.id}"]:checked`)) answered++;
    });
    const pct = Math.round((answered / 50) * 100);
    document.getElementById("patientProgressFill").style.width = pct + "%";
    document.getElementById("pillAnswered").textContent = `${answered}/50`;
    document.getElementById("footerAnswered").textContent = answered;
  }

  // ── Cálculo de pontuação ──────────────────────────────────────────────
  function pontuar(id, resp) {
    // resp é "CT" | "CP" | "DP" | "DT"
    const concorda = (resp === "CT" || resp === "CP");
    const discorda = (resp === "DP" || resp === "DT");
    if (GRUPO_A.has(id) && concorda) return 1;
    if (GRUPO_B.has(id) && discorda) return 1;
    return 0;
  }

  function calcularResultados() {
    const respostas = {};
    let missing = 0;
    ITENS.forEach(item => {
      const el = document.querySelector(`input[name="q${item.id}"]:checked`);
      if (el) respostas[item.id] = el.value;
      else missing++;
    });

    let total = 0;
    const pontos = {};
    ITENS.forEach(item => {
      const r = respostas[item.id];
      const p = r ? pontuar(item.id, r) : 0;
      pontos[item.id] = p;
      total += p;
    });

    // Subescalas
    const subEscalasPontos = {};
    Object.entries(SUBESCALAS).forEach(([nome, ids]) => {
      subEscalasPontos[nome] = ids.reduce((acc, id) => acc + (pontos[id] || 0), 0);
    });

    return { respostas, pontos, total, subEscalasPontos, missing };
  }

  // ── Gerar HTML do relatório (profissional, self-contained) ─────────────
  function gerarRelatorio(resultado) {
    const paciente = document.getElementById("paciente").value.trim() || "Não informado";
    const cpf = document.getElementById("cpf")?.value?.trim() || "";
    const dataNasc = document.getElementById("dataNascimento")?.value || "";
    const respondente = document.getElementById("respondente")?.value?.trim() || "";
    const dataAval = document.getElementById("data").value || new Date().toISOString().slice(0,10);

  // ── Envio ─────────────────────────────────────────────────────────────
  async function finalizarEEnviar() {

      if (!confirmou) return;

    const paciente = document.getElementById("paciente").value.trim();

      alert("Por favor, informe o nome do paciente antes de enviar.");
      document.getElementById("paciente").focus();
      return;
    }

    // Gerar HTML do relatório
    const resultado = { respostas, pontos, total, subEscalasPontos, missing };
    const repHtml = gerarRelatorio(resultado);
    document.getElementById("repFrame").innerHTML = repHtml;
    document.getElementById("repOverlay").style.display = "block";
    document.getElementById("repOverlay").style.left = "-9999px";

          scoresObj[nome] = { bruto: pts, maximo: 10 };

          dataAplicacao: new Date().toISOString(),
          resumo: "QA - Total: " + total + "/50 (" + interp.faixa + ") | " +
                  Object.entries(subEscalasPontos).map(([n, p]) => n + ": " + p).join(", "),

        });

                    border-radius:50%;animation:__qaspin__ 0.8s linear infinite;margin:0 auto 20px;"></div>
        <div id="__qa_msg__" style="font-size:16px;font-weight:800;color:#5b21b6;margin-bottom:6px;">

      </div>

    const setMsg = (txt) => {

    try {
      await new Promise(r => setTimeout(r, 120));

      // Mover overlay para posição renderizável
      const repOverlay = document.getElementById("repOverlay");
      repOverlay.style.left = "0";
      repOverlay.style.position = "absolute";

        margin: [12, 12, 12, 12],
        filename: `QA_${paciente.replace(/\s+/g,"_")}.pdf`,

          scale: 3,

              </h1>
              <p style="font-size:15px;color:#374151;line-height:1.6;margin:0 0 8px;">
                As suas respostas foram processadas e enviadas com segurança.
              </p>
              <p style="font-size:13px;color:#94a3b8;margin:24px 0 0;">
                Já pode fechar esta janela.
              </p>
            </div>
          </div>`;
      } else {
        throw new Error(data.mensagem || "Resposta inesperada do servidor.");
      }

    } catch (err) {
      console.error("Erro ao enviar:", err);
      const ct = document.getElementById("__qa_cortina__");
      if (ct) ct.remove();
      document.getElementById("repOverlay").style.display = "none";
      btnEnviar.disabled = false;
      btnEnviar.textContent = "📤 Enviar Respostas";
      alert("Não foi possível enviar as respostas.\n\nVerifique a sua ligação à internet e tente novamente.\n\nDetalhe: " + err.message);
    }
  }

  // ── Inicialização ─────────────────────────────────────────────────────
  document.addEventListener("DOMContentLoaded", () => {
    // Data padrão = hoje
    const dataEl = document.getElementById("data");
    if (dataEl) dataEl.value = new Date().toISOString().slice(0,10);

    renderItens();
    atualizarProgresso();

    document.getElementById("btnEnviar").addEventListener("click", finalizarEEnviar);
  });
  </script>
</body>
</html>
