<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RAADS-R-BR Screen | Equilibrium</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/Aplicacao_testes/RAADS-R/styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { background: #f0f4f8; }
    .p-shell { max-width: 820px; margin: 0 auto; padding: 24px 16px 110px; }
    .p-header { background: #fff; border-radius: 16px; padding: 18px 24px; margin-bottom: 16px; box-shadow: 0 1px 8px rgba(0,0,0,.07); display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .p-brand { display: flex; align-items: center; gap: 12px; }
    .p-logo { height: 36px; }
    .p-brand-name { font-weight: 800; font-size: 15px; color: #1e293b; }
    .p-brand-sub { font-size: 11px; color: #64748b; }
    .p-test { text-align: right; }
    .p-test-name { font-weight: 700; font-size: 16px; color: #7c3aed; }
    .p-test-count { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .p-progress-bar { height: 5px; background: #e2e8f0; border-radius: 4px; margin-bottom: 16px; overflow: hidden; }
    .p-progress-fill { height: 100%; background: #7c3aed; width: 0%; transition: width .35s ease; border-radius: 4px; }
    .p-card { background: #fff; border-radius: 16px; padding: 28px 28px 32px; box-shadow: 0 1px 8px rgba(0,0,0,.07); }
    .p-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 540px) { .p-fields { grid-template-columns: 1fr; } }
    .p-field label { display: block; font-size: 10.5px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
    .p-field input { width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 15px; font-family: inherit; color: #1e293b; outline: none; transition: border-color .2s, box-shadow .2s; background: #fafcff; }
    .p-field input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.12); background: #fff; }
    .p-divider { border: none; border-top: 1.5px solid #f1f5f9; margin: 24px 0; }
    .p-items-heading { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 20px; }
    .tag { display: none !important; }
    .p-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1.5px solid #e8edf2; padding: 13px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; z-index: 200; box-shadow: 0 -4px 20px rgba(0,0,0,.08); }
    .p-footer-info { font-size: 13px; color: #64748b; }
    .p-footer-info strong { color: #1e293b; font-weight: 700; }
    .btn-enviar { display: inline-flex; align-items: center; gap: 8px; background: #7c3aed; color: #fff; border: none; border-radius: 12px; padding: 12px 28px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; transition: opacity .2s, transform .15s, box-shadow .2s; box-shadow: 0 4px 14px rgba(124,58,237,.35); letter-spacing: .01em; white-space: nowrap; }
    .btn-enviar:hover { opacity: .88; transform: translateY(-1px); }
    .btn-enviar:active { transform: translateY(0); opacity: 1; }
    .btn-enviar:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
    .success-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(145deg, #f0f4ff 0%, #ede9fe 100%); }
    .success-card { background: #fff; border-radius: 22px; padding: 60px 44px; text-align: center; max-width: 560px; width: 100%; box-shadow: 0 20px 50px rgba(124,58,237,.14); }
    .success-icon { font-size: 64px; margin-bottom: 22px; }
    .success-card h1 { font-size: 26px; color: #5b21b6; margin: 0 0 14px; }
    .success-card p { font-size: 16px; color: #555; line-height: 1.65; margin: 0 0 8px; }
    .success-note { font-size: 13px; color: #a0aec0; margin-top: 28px !important; }
    .raadsr-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .raadsr-modal-overlay.active { display: flex; }
    .raadsr-modal-box { background: #fff; border-radius: 20px; padding: 48px 40px; text-align: center; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .raadsr-modal-spinner { width: 52px; height: 52px; border: 4px solid #e2e8f0; border-top-color: #7c3aed; border-radius: 50%; margin: 0 auto 24px; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .raadsr-modal-title { font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
    .raadsr-modal-sub { font-size: 14px; color: #64748b; }
  </style>
</head>
<body>
  <div class="raadsr-modal-overlay" id="modalGerando">
    <div class="raadsr-modal-box">
      <div class="raadsr-modal-spinner"></div>
      <div class="raadsr-modal-title" id="__raadsr_modal_title__">A processar…</div>
      <div class="raadsr-modal-sub" id="__raadsr_modal_sub__">Por favor, não feche esta página.</div>
    </div>
  </div>

  <div class="p-shell" id="appShell">
    <div class="p-header">
      <div class="p-brand">
        <img src="/logo.png" alt="Equilibrium" class="p-logo" onerror="this.style.display='none'">
        <div>
          <div class="p-brand-name">Equilibrium</div>
          <div class="p-brand-sub">Neuropsicologia</div>
        </div>
      </div>
      <div class="p-test">
        <div class="p-test-name" id="subtitle">Carregando…</div>
        <div class="p-test-count">Respondidos: <strong id="pillAnswered">0/—</strong></div>
      </div>
    </div>

    <div class="p-progress-bar">
      <div class="p-progress-fill" id="patientProgressFill"></div>
    </div>

    <div class="p-card">
      <div class="p-fields">
        <div class="p-field">
          <label>Nome do paciente</label>
          <input id="paciente" type="text" placeholder="Nome completo" autocomplete="name" />
        </div>
        <div class="p-field">
          <label>Data da avaliação</label>
          <input id="data" type="date" />
        </div>
      </div>

      <hr class="p-divider" />
      <div class="p-items-heading">Por favor, responda todos os itens abaixo</div>
      <div id="itens" class="itens"></div>
    </div>
  </div>

  <div class="p-footer">
    <div class="p-footer-info">Respondidos: <strong id="footerAnswered">0</strong> de <strong id="footerTotal">—</strong></div>
    <button class="btn-enviar" id="btnEnviar" type="button">📤 Enviar Respostas</button>
  </div>

  <input id="avaliador" type="hidden" value="Paciente" />

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/auth.js"></script>

  <script>
    const FORM_KEY = "raadsr_screen";
    const RAADSR_ACCENT_VAR = "--raadsr-accent";
    const DATA_PATH = "/Aplicacao_testes/RAADS-R/data/raadsr_rules.json";
    
    // ⚠️ CONFIGURE ESTA URL APÓS CRIAR O GOOGLE APPS SCRIPT
    const URL_DO_GOOGLE_SCRIPT = "https://script.google.com/macros/s/AKfycbwE2m8qFQWL3oGbo9nNAORWRLHmpPjZOM2mEg5XIG-FaTAjurYFT5iq9JbCt1uWPE3N/exec"; // Cole aqui a URL do Apps Script gerado
  </script>
  <script src="/Aplicacao_testes/RAADS-R/script.js"></script>
  
  <script>
    // IMPORTANTE: Adicionar esta função ao final do script.js ou aqui mesmo
    // Esta função sobrescreve o envio original para incluir Google Drive
    
    const enviarOriginal = window.enviarFormulario;
    
    window.enviarFormulario = async function() {
      const paciente = document.getElementById('paciente')?.value?.trim();
      const data = document.getElementById('data')?.value;

      if(!paciente) { alert('Por favor, preencha o nome do paciente.'); return; }
      if(!data) { alert('Por favor, preencha a data da avaliação.'); return; }

      const respostas = window.coletarRespostas ? window.coletarRespostas() : {};
      
      if(!respostas || Object.keys(respostas).length < 20) {
        alert('Por favor, responda todos os 20 itens antes de enviar.');
        return;
      }

      const modal = document.getElementById('modalGerando');
      if(modal) modal.classList.add('active');
      
      const modalTitle = document.getElementById('__raadsr_modal_title__');
      
      try {
        if(modalTitle) modalTitle.textContent = 'Calculando resultado...';
        const resultado = window.calcularPontuacao ? window.calcularPontuacao(respostas) : { total: 0 };
        
        if(modalTitle) modalTitle.textContent = 'Gerando relatório PDF...';
        const pdfBase64 = await gerarPDFBase64(paciente, data, resultado.total);
        
        if(URL_DO_GOOGLE_SCRIPT && URL_DO_GOOGLE_SCRIPT.length > 10) {
          if(modalTitle) modalTitle.textContent = 'Enviando para o Google Drive...';
          
          await fetch(URL_DO_GOOGLE_SCRIPT, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
              paciente: paciente,
              data: data,
              pontuacao: resultado.total,
              pdfBase64: pdfBase64
            })
          });
        }
        
        if(modal) modal.classList.remove('active');
        mostrarSucesso();
        
      } catch(error) {
        console.error('Erro:', error);
        if(modal) modal.classList.remove('active');
        alert('Erro ao processar. Tente novamente.');
      }
    };

    function mostrarSucesso() {
      document.body.innerHTML = `
        <div class="success-screen">
          <div class="success-card">
            <div class="success-icon">✅</div>
            <h1>Respostas Enviadas com Sucesso!</h1>
            <p>Obrigado por completar o questionário RAADS-R-BR Screen.</p>
            <p>Suas respostas foram registradas.</p>
            <p class="success-note">Você pode fechar esta janela agora.</p>
          </div>
        </div>
      `;
    }

    async function gerarPDFBase64(nome, data, pont) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF('p', 'mm', 'a4');
      const df = new Date(data+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
      const interp = pont >= 46 ? `A pontuação de ${pont} pontos encontra-se ACIMA do ponto de corte (46). Este resultado indica comportamentos compatíveis com o Espectro Autista (sensibilidade 90,1%).` : `A pontuação de ${pont} pontos encontra-se ABAIXO do ponto de corte (46).`;
      
      doc.setFillColor(124,58,237);doc.rect(0,0,210,40,'F');doc.setTextColor(255,255,255);doc.setFontSize(22);doc.setFont('helvetica','bold');doc.text('RAADS-R-BR Screen',105,18,{align:'center'});doc.setFontSize(11);doc.setFont('helvetica','normal');doc.text('Escala Ritvo - Diagnóstico de Autismo em Adultos',105,28,{align:'center'});
      doc.setFillColor(248,250,252);doc.roundedRect(15,50,180,25,3,3,'F');doc.setTextColor(148,163,184);doc.setFontSize(9);doc.setFont('helvetica','bold');doc.text('PACIENTE',20,58);doc.text('DATA',115,58);doc.setTextColor(30,41,59);doc.setFontSize(13);doc.text(nome,20,68);doc.text(df,115,68);
      doc.setFontSize(15);doc.setTextColor(30,41,59);doc.setFont('helvetica','bold');doc.text('Sobre o Instrumento',15,88);doc.setFontSize(10);doc.setTextColor(71,85,105);doc.setFont('helvetica','normal');doc.text(doc.splitTextToSize('O RAADS-R-BR Screen identifica características do TEA em adultos (20 itens). Sensibilidade 90,1%, especificidade 87,9%.',175),15,96);
      doc.setFontSize(15);doc.setFont('helvetica','bold');doc.text('Resultados',15,120);
      doc.setFillColor(239,68,68);doc.roundedRect(25,130,45,25,3,3,'F');doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text('Pontuação',47.5,138,{align:'center'});doc.setFontSize(24);doc.setFont('helvetica','bold');doc.text(pont.toString(),47.5,150,{align:'center'});
      doc.setFillColor(59,130,246);doc.roundedRect(82.5,130,45,25,3,3,'F');doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text('Corte',105,138,{align:'center'});doc.setFontSize(24);doc.setFont('helvetica','bold');doc.text('46',105,150,{align:'center'});
      doc.setFillColor(107,114,128);doc.roundedRect(140,130,45,25,3,3,'F');doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text('Máxima',162.5,138,{align:'center'});doc.setFontSize(24);doc.setFont('helvetica','bold');doc.text('80',162.5,150,{align:'center'});
      
      const h=55,w=35,s=15,by=220,bx=40;
      doc.setFillColor(239,68,68);doc.rect(bx,by-(pont/80)*h,w,(pont/80)*h,'F');doc.setTextColor(30,41,59);doc.setFontSize(14);doc.text(pont.toString(),bx+w/2,by-(pont/80)*h-3,{align:'center'});
      doc.setFillColor(59,130,246);doc.rect(bx+w+s,by-(46/80)*h,w,(46/80)*h,'F');doc.text('46',bx+w+s+w/2,by-(46/80)*h-3,{align:'center'});
      doc.setFillColor(107,114,128);doc.rect(bx+(w+s)*2,by-h,w,h,'F');doc.text('80',bx+(w+s)*2+w/2,by-h-3,{align:'center'});
      
      doc.setFontSize(15);doc.text('Interpretação',15,235);doc.setFillColor(240,249,255);doc.roundedRect(15,240,180,25,2,2,'F');doc.setFontSize(9);doc.setTextColor(30,41,59);doc.text(doc.splitTextToSize(interp,170),20,245);
      doc.setFontSize(8);doc.setTextColor(148,163,184);doc.text('Relatório - Equilibrium Neuropsicologia',105,285,{align:'center'});
      
      return doc.output('datauristring').split(',')[1];
    }
  </script>
</body>
</html>
