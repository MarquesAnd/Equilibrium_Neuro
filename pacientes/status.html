<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status do Sistema - Equilibrium Neuro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 18px;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .status-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .status-item:last-child {
            border-bottom: none;
        }
        
        .status-label {
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }
        
        .status-value {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
        }
        
        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .badge.success {
            background: #E8F5E9;
            color: #4CAF50;
        }
        
        .badge.error {
            background: #FFEBEE;
            color: #F44336;
        }
        
        .badge.warning {
            background: #FFF3E0;
            color: #FF9800;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        
        .btn-primary {
            background: #2196F3;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1976D2;
        }
        
        .btn-success {
            background: #4CAF50;
            color: white;
        }
        
        .btn-success:hover {
            background: #388E3C;
        }
        
        .btn-danger {
            background: #F44336;
            color: white;
        }
        
        .btn-danger:hover {
            background: #D32F2F;
        }
        
        .actions {
            text-align: center;
            margin-top: 20px;
        }
        
        .console-output {
            background: #1e1e1e;
            color: #4CAF50;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2196F3;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Equilibrium Neuro</h1>
            <p>Status do Sistema de Pacientes</p>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 20px; color: #333;">📊 Status dos Componentes</h2>
            
            <div id="statusList">
                <div class="loading">
                    <div class="spinner"></div>
                    <p style="color: #666;">Verificando sistema...</p>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 20px; color: #333;">⚙️ Configuração</h2>
            
            <div class="status-item">
                <div class="status-label">Modo de Armazenamento:</div>
                <div class="status-value">
                    <span id="storageMode">Verificando...</span>
                </div>
            </div>
            
            <div class="status-item">
                <div class="status-label">Usuário Autenticado:</div>
                <div class="status-value">
                    <span id="currentUser">Verificando...</span>
                </div>
            </div>
            
            <div class="status-item">
                <div class="status-label">Total de Pacientes:</div>
                <div class="status-value">
                    <span id="totalPatients">0</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 20px; color: #333;">🔧 Ações Rápidas</h2>
            
            <div class="actions">
                <button class="btn btn-primary" onclick="window.location.href='index.html'">
                    🏠 Ir para Sistema
                </button>
                <button class="btn btn-success" onclick="criarPacientesExemplo()">
                    ➕ Criar Pacientes de Teste
                </button>
                <button class="btn btn-primary" onclick="testarSistema()">
                    🧪 Testar Sistema
                </button>
                <button class="btn btn-danger" onclick="limparDados()">
                    🗑️ Limpar Todos os Dados
                </button>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 20px; color: #333;">📋 Log do Sistema</h2>
            <div class="console-output" id="consoleOutput">
                Aguardando ações...
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- Database Adapter -->
    <script src="db-adapter.js"></script>

    <script>
        // Capturar console.log
        const consoleOutput = document.getElementById('consoleOutput');
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            const message = args.join(' ');
            consoleOutput.innerHTML += message + '\n';
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        };

        // Verificar sistema
        async function checkSystem() {
            const statusList = document.getElementById('statusList');
            const checks = [];

            checks.push({
                label: 'Firebase SDK',
                status: typeof firebase !== 'undefined',
                detail: typeof firebase !== 'undefined' ? 'Carregado' : 'Não encontrado'
            });

            const firebaseInit = typeof firebase !== 'undefined' && firebase.apps.length > 0;
            checks.push({
                label: 'Firebase Inicializado',
                status: firebaseInit,
                detail: firebaseInit ? firebase.app().options.projectId : 'Não inicializado'
            });

            checks.push({
                label: 'Firestore Database',
                status: typeof firebase !== 'undefined' && firebase.firestore,
                detail: typeof firebase !== 'undefined' && firebase.firestore ? 'Disponível' : 'Não disponível'
            });

            checks.push({
                label: 'Database Adapter',
                status: typeof window.dbAdapter !== 'undefined',
                detail: typeof window.dbAdapter !== 'undefined' ? 'Carregado' : 'Não carregado'
            });

            statusList.innerHTML = checks.map(check => `
                <div class="status-item">
                    <div class="status-label">${check.label}</div>
                    <div class="status-value">
                        <span class="badge ${check.status ? 'success' : 'error'}">
                            ${check.status ? '✓ OK' : '✗ Erro'}
                        </span>
                        <span style="color: #666;">${check.detail}</span>
                    </div>
                </div>
            `).join('');

            updateInfo();
        }

        async function updateInfo() {
            const storageMode = document.getElementById('storageMode');
            if (window.dbAdapter) {
                const mode = window.dbAdapter.useFirebase ? 'Firebase Firestore' : 'localStorage';
                const badge = window.dbAdapter.useFirebase ? 'success' : 'warning';
                storageMode.innerHTML = `<span class="badge ${badge}">${mode}</span>`;
            }

            const currentUserEl = document.getElementById('currentUser');
            if (window.dbAdapter) {
                const user = window.dbAdapter.getCurrentUser();
                currentUserEl.textContent = user ? (user.email || user.displayName || 'Anônimo') : 'Nenhum';
            }

            if (window.dbAdapter) {
                const patients = await window.dbAdapter.getPatients();
                document.getElementById('totalPatients').textContent = patients.length;
            }
        }

        async function criarPacientesExemplo() {
            console.log('🚀 Criando pacientes de exemplo...');
            
            const exemplos = [
                {
                    fullName: 'João da Silva',
                    cpf: '123.456.789-00',
                    birthDate: '1985-05-15',
                    gender: 'Masculino',
                    email: 'joao@email.com',
                    mobile: '(11) 98765-4321',
                    addressCity: 'São Paulo',
                    profession: 'Engenheiro',
                    chiefComplaint: 'Dificuldades de memória após acidente'
                },
                {
                    fullName: 'Maria Santos',
                    cpf: '987.654.321-00',
                    birthDate: '1990-08-20',
                    gender: 'Feminino',
                    email: 'maria@email.com',
                    mobile: '(11) 91234-5678',
                    addressCity: 'São Paulo',
                    profession: 'Professora',
                    chiefComplaint: 'Sintomas de ansiedade'
                },
                {
                    fullName: 'Pedro Oliveira',
                    cpf: '456.789.123-00',
                    birthDate: '1978-03-10',
                    gender: 'Masculino',
                    email: 'pedro@email.com',
                    mobile: '(11) 99876-5432',
                    addressCity: 'Rio de Janeiro',
                    profession: 'Advogado',
                    chiefComplaint: 'Problemas de concentração'
                }
            ];

            for (const paciente of exemplos) {
                try {
                    await window.dbAdapter.createPatient(paciente);
                    console.log(`✅ ${paciente.fullName} criado`);
                } catch (error) {
                    console.log(`❌ Erro ao criar ${paciente.fullName}: ${error.message}`);
                }
            }

            console.log('✅ Pacientes criados com sucesso!');
            setTimeout(() => updateInfo(), 500);
        }

        async function testarSistema() {
            console.log('🧪 Iniciando testes do sistema...\n');

            try {
                console.log('📝 Teste 1: Criando paciente...');
                const patientData = {
                    fullName: 'Teste Sistema',
                    cpf: '000.000.000-00',
                    status: 'active'
                };
                const patientId = await window.dbAdapter.createPatient(patientData);
                console.log('✅ Paciente criado:', patientId);

                console.log('\n📝 Teste 2: Buscando paciente...');
                const patient = await window.dbAdapter.getPatient(patientId);
                console.log('✅ Paciente encontrado:', patient.fullName);

                console.log('\n📝 Teste 3: Atualizando paciente...');
                await window.dbAdapter.updatePatient(patientId, { notes: 'Teste concluído' });
                console.log('✅ Paciente atualizado');

                console.log('\n📝 Teste 4: Deletando paciente...');
                await window.dbAdapter.deletePatient(patientId);
                console.log('✅ Paciente deletado');

                console.log('\n🎉 TODOS OS TESTES PASSARAM!');
                
            } catch (error) {
                console.log('\n❌ ERRO NOS TESTES:', error.message);
            }

            setTimeout(() => updateInfo(), 500);
        }

        async function limparDados() {
            if (!confirm('⚠️ ATENÇÃO: Isso vai deletar TODOS os pacientes!\n\nDeseja continuar?')) {
                return;
            }

            console.log('🗑️ Deletando todos os pacientes...');
            
            const patients = await window.dbAdapter.getPatients();
            
            for (const p of patients) {
                await window.dbAdapter.deletePatient(p.id);
                console.log(`✅ ${p.fullName} deletado`);
            }

            console.log('✅ Todos os dados deletados!');
            setTimeout(() => updateInfo(), 500);
        }

        window.addEventListener('load', () => {
            setTimeout(checkSystem, 500);
        });
    </script>
</body>
</html>
