<html lang="pt-BR">

<title>Equilibrium — Entrevista de Anamnese</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,sans-serif;background:linear-gradient(135deg,#f0fdfa 0%,#e0f2fe 50%,#f0fdf4 100%);min-height:100vh;font-size:14px;color:#0f172a}
.wrap{max-width:860px;margin:0 auto;padding:28px 20px 60px}
.top-header{text-align:center;margin-bottom:32px}
.top-logo{display:inline-flex;align-items:center;gap:12px;background:white;border-radius:20px;padding:12px 24px;box-shadow:0 2px 16px rgba(13,148,136,.12);margin-bottom:20px}
.logo-dot{width:38px;height:38px;background:#0d9488;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:white}
.logo-name{font-size:17px;font-weight:800;color:#0f172a;letter-spacing:-.3px}
.logo-sub{font-size:10px;color:#64748b}
.page-title{font-size:26px;font-weight:800;color:#0f172a;letter-spacing:-.5px;margin-bottom:6px}
.page-sub{font-size:14px;color:#64748b}
.card{background:white;border-radius:20px;border:1.5px solid #e2e8f0;padding:24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.card-sm{background:white;border-radius:16px;border:1.5px solid #e2e8f0;padding:20px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,.03)}
.faixa-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.fc{background:white;border:2px solid #e2e8f0;border-radius:16px;padding:16px 10px;text-align:center;cursor:pointer;transition:all .2s;position:relative;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.fc:hover{border-color:#0d9488;background:#f0fdfa;transform:translateY(-3px);box-shadow:0 8px 24px rgba(13,148,136,.15)}
.fc.on{border-color:#0d9488;background:#f0fdfa;box-shadow:0 0 0 4px rgba(13,148,136,.12)}
.fc.on::after{content:'✓';position:absolute;top:-9px;right:-9px;width:20px;height:20px;background:#0d9488;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
.fc-ic{font-size:24px;margin-bottom:7px}
.fc-tt{font-size:11px;font-weight:800;color:#0f172a;margin-bottom:2px}
.fc-rg{font-size:10px;color:#64748b}
.sect-head{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #f1f5f9}
.sect-ic{font-size:15px;width:28px;height:28px;background:#f0fdfa;border-radius:8px;display:flex;align-items:center;justify-content:center}
.sect-tt{font-size:11px;font-weight:800;color:#0d9488;text-transform:uppercase;letter-spacing:.08em}
.fg-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fg-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.fg-full{grid-column:1/-1}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em}
.fg label .req{color:#f43f5e;margin-left:2px}
.fg input,.fg select,.fg textarea{padding:10px 13px;border:1.5px solid #e2e8f0;border-radius:12px;font-size:13px;font-family:inherit;color:#0f172a;background:#fafcff;outline:none;transition:all .2s;width:100%}
.fg textarea{min-height:80px;resize:vertical;line-height:1.6}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#0d9488;box-shadow:0 0 0 4px rgba(13,148,136,.1);background:white}

.ck:hover{border-color:#0d9488;background:#f0fdfa}

.ck span{font-size:12px;color:#374151;font-weight:500}
.acts{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap}
.btn-main{padding:12px 26px;border:none;border-radius:14px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;background:#0d9488;color:white;box-shadow:0 4px 14px rgba(13,148,136,.3);transition:all .2s}
.btn-main:hover{background:#0f766e;transform:translateY(-1px)}
.btn-sec{padding:12px 20px;border:2px solid #e2e8f0;border-radius:14px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;background:white;color:#64748b;transition:all .2s}
.btn-sec:hover{border-color:#0d9488;color:#0d9488;background:#f0fdfa}
.badge{display:inline-flex;align-items:center;gap:7px;background:#f0fdfa;border:2px solid #0d9488;border-radius:24px;padding:5px 14px;font-size:12px;font-weight:700;color:#0f766e;margin-bottom:16px}
.rep-header{background:#0d9488;border-radius:20px 20px 0 0;padding:28px 32px;color:white;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px}
.rep-brand-name{font-size:16px;font-weight:800}
.rep-brand-sub{font-size:10px;opacity:.8}
.rep-title{font-size:20px;font-weight:800;margin-bottom:3px}
.rep-subt{font-size:11px;opacity:.85}
.rep-body{background:white;border:1.5px solid #e2e8f0;border-top:none;border-radius:0 0 20px 20px;padding:32px}
.rep-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;background:#f8fafc;border-radius:14px;padding:16px;margin-bottom:28px}
.rep-ml{font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.rep-mv{font-size:13px;font-weight:700;color:#0f172a}
.rep-sc{margin-bottom:26px}
.rep-st{font-size:14px;font-weight:800;color:#0f766e;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #f0fdfa}
.rep-bl{background:#f8fafc;border-left:4px solid #0d9488;border-radius:0 12px 12px 0;padding:16px 20px}
.rep-tx{font-size:13.5px;color:#1e293b;line-height:1.85}
.rep-footer{margin-top:32px;padding-top:20px;border-top:2px solid #f1f5f9;text-align:center}
.rep-footer p{font-size:11px;color:#94a3b8;margin-bottom:4px}
.rep-acts{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.btn-print{padding:10px 20px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;background:#0d9488;color:white;font-family:inherit;box-shadow:0 3px 10px rgba(13,148,136,.25)}
.btn-back{padding:10px 16px;border:2px solid #e2e8f0;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;background:white;color:#64748b;font-family:inherit}
.btn-back:hover{border-color:#0d9488;color:#0d9488}
@media(max-width:700px){.faixa-grid{grid-template-columns:repeat(3,1fr)}.fg-grid,.fg-grid3{grid-template-columns:1fr}.rep-meta{grid-template-columns:1fr 1fr}}
@media print{body{background:white}.rep-acts{display:none}.wrap{padding:0}}

</head>

/* ═══════════════════════════════════════════
   UTILITÁRIOS
═══════════════════════════════════════════ */
let state='select', fk=null, saved=null;

function calcIdade(d){
  if(!d)return'—';
  const n=new Date(d+'T00:00:00'),h=new Date();
  let a=h.getFullYear()-n.getFullYear();
  if(h.getMonth()<n.getMonth()||(h.getMonth()===n.getMonth()&&h.getDate()<n.getDate()))a--;
  const m=(h.getFullYear()-n.getFullYear())*12+(h.getMonth()-n.getMonth());
  return a<2?m+' meses':a+' anos';
}
function fmtDate(d){
  if(!d)return'—';
  return new Date(d+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
}
function fId(k,si,fi,ii){return`${k}_${si}_${fi}${ii!==undefined?'_'+ii:''}`;}
function v(id){const e=document.getElementById(id);return e?e.value.trim():'';}
function cks(k,si,fi,its){return its.filter((_,ii)=>{const e=document.getElementById(fId(k,si,fi,ii));return e&&e.checked;});}

function coletarDados(k){
  const d={faixa:`${F[k].tt} (${F[k].rg})`};
  F[k].sects.forEach((s,si)=>{
    (s.g2||s.g3||[]).forEach((f,fi)=>{
      if(f.tp==='cks') d[f.id]=cks(k,si,fi,f.its);
      else{ const e=document.getElementById(fId(k,si,fi)); if(e) d[f.id]=e.value.trim(); }
    });
  });
  return d;
}

/* ═══════════════════════════════════════════
   GERAÇÃO DE TEXTO SEM IA — templates narrativos
═══════════════════════════════════════════ */
function ora(n){ return n && n.toLowerCase().startsWith('a') ? 'da' : 'do'; }
function nome(d){ return d.nom||'o(a) paciente'; }
function nomeArt(d){ return d.nom ? `${ora(d.nom)} ${d.nom}` : 'do(a) paciente'; }
function ele(d){ return (d.sex==='Feminino'||d.sex==='F') ? 'ela' : 'ele'; }
function del(d){ return (d.sex==='Feminino'||d.sex==='F') ? 'dela' : 'dele'; }
function lo(d){ return (d.sex==='Feminino'||d.sex==='F') ? 'a' : 'o'; }
function ado(d){ return (d.sex==='Feminino'||d.sex==='F') ? 'a avalianda' : 'o avaliando'; }
function hasDados(val){ return val && val !== '' && val !== 'Selecione...' && val !== 'Não sabe informar'; }
function lista(arr){ if(!arr||!arr.length) return null; if(arr.length===1) return arr[0]; return arr.slice(0,-1).join(', ')+' e '+arr[arr.length-1]; }

function gerarTextoInfantil(d){
  const nm = nome(d); const nmA = nomeArt(d); const lg = lo(d); const ev = ele(d); const dv = del(d);
  const secs = [];

  /* 1. DESCRIÇÃO DA DEMANDA */
  let dem = `A avaliação neuropsicológica ${nmA}, solicitada em ${fmtDate(d.ava)}, tem como objetivo central a investigação`;
  if(hasDados(d.mot)) dem += ` do seguinte quadro, conforme relatado pel${lg} responsável: ${d.mot}`;
  else dem += ' das dificuldades apresentadas no desenvolvimento.';
  if(hasDados(d.tmq)) dem += ` As queixas estão presentes ${d.tmq.toLowerCase()}.`;
  if(hasDados(d.imp)) dem += ` O impacto dessas dificuldades no cotidiano familiar é descrito da seguinte forma: ${d.imp}`;
  secs.push({tt:'1. Descrição da Demanda', tx:dem});

  /* 2. HISTÓRICO PERINATAL */
  let per = '';
  const temPeri = hasDados(d.par)||hasDados(d.ris)||hasDados(d.sem)||hasDados(d.pes)||(d.ico&&d.ico.length);
  if(temPeri){
    per = `O histórico pré-natal e perinatal ${nmA} apresenta`;
    const ics = [];
    if(d.ris==='Sim') ics.push('gestação classificada como de alto risco');
    if(d.ico&&d.ico.length) ics.push(`ocorrência de ${lista(d.ico).toLowerCase()}`);
    if(ics.length) per += ` os seguintes elementos de relevância clínica: ${lista(ics)}.`;
    else per += ' os seguintes dados disponíveis.';
    if(hasDados(d.par)) per += ` O nascimento ocorreu por ${d.par.toLowerCase()}.`;
    if(hasDados(d.sem)) per += ` A gestação totalizou ${d.sem} semanas.`;
    if(hasDados(d.pes)) per += ` O peso ao nascer foi de ${d.pes}g.`;
    if(hasDados(d.ap1)&&hasDados(d.ap5)) per += ` Os escores de Apgar foram de ${d.ap1} no 1º minuto e ${d.ap5} no 5º minuto.`;
    if(hasDados(d.obs)) per += ` ${d.obs}`;
  } else {
    per = `O histórico perinatal ${nmA} é baseado em relato subjetivo dos responsáveis, sem intercorrências significativas relatadas. A análise deste período é limitada pela ausência de dados objetivos, como escores de Apgar e registros neonatais detalhados.`;
  }
  secs.push({tt:'2. Histórico Pré-natal e Perinatal', tx:per});

  /* 3. NEURODESENVOLVIMENTO */
  let dev = `O histórico de neurodesenvolvimento ${nmA} é baseado no relato `;
  dev += hasDados(d.rel) ? `d${d.rel.toLowerCase()==='pai/mãe'?'os pais':d.rel.toLowerCase()}.` : 'dos responsáveis.';
  const marcos = [];
  if(hasDados(d.mc1)) marcos.push(`sustentação da cabeça aos ${d.mc1} meses`);
  if(hasDados(d.mc2)) marcos.push(`sentar sem apoio aos ${d.mc2} meses`);
  if(hasDados(d.mc3)) marcos.push(`deambulação independente aos ${d.mc3} meses`);
  if(hasDados(d.mc4)) marcos.push(`primeiras palavras aos ${d.mc4} meses`);
  if(hasDados(d.mc5)) marcos.push(`frases simples aos ${d.mc5} meses`);
  if(hasDados(d.mc6)) marcos.push(`controle esfincteriano aos ${d.mc6} meses`);
  if(marcos.length) dev += ` Os marcos do desenvolvimento foram registrados da seguinte forma: ${lista(marcos)}.`;
  else dev += ' Não foram fornecidos dados específicos sobre a cronologia dos marcos do desenvolvimento neuropsicomotor, o que representa uma limitação para a análise retrospectiva deste período.';
  if(hasDados(d.reg) && d.reg !== 'Não houve regressão') dev += ` **De relevância clínica**, foi relatada ${d.reg.toLowerCase()}, dado que requer investigação detalhada.`;
  if(hasDados(d.dob)) dev += ` ${d.dob}`;
  secs.push({tt:'3. Histórico do Neurodesenvolvimento', tx:dev});

  /* 4. LINGUAGEM */
  let ling = '';
  if(hasDados(d.lng)||hasDados(d.cvi)||(d.clg&&d.clg.length)){
    ling = `O **perfil de linguagem e comunicação** apresentado por ${nm} caracteriza-se atualmente por`;
    if(hasDados(d.lng)) ling += ` ${d.lng.toLowerCase()}.`;
    else ling += ' padrão ainda em investigação.';
    if(hasDados(d.cvi)) ling += ` O **contato visual** é descrito como ${d.cvi.toLowerCase()}.`;
    if(d.clg&&d.clg.length) ling += ` São reportadas as seguintes características: **${lista(d.clg)}**.`;
    secs.push({tt:'4. Linguagem e Comunicação', tx:ling});
  }

  /* 5. COMPORTAMENTO E SENSORIAL */
  let comp = '';
  if((d.cmp&&d.cmp.length)||(d.sen&&d.sen.length)||hasDados(d.cob)){
    comp = `O **perfil comportamental e sensorial** ${nmA} é marcado por`;
    const itens = [];
    if(d.cmp&&d.cmp.length) itens.push(`presença de ${lista(d.cmp).toLowerCase()}`);
    if(d.sen&&d.sen.length) itens.push(`**disfunção de modulação sensorial**, com padrão de ${lista(d.sen).toLowerCase()}`);
    if(itens.length) comp += ` ${lista(itens)}.`;
    else comp += ' características em avaliação.';
    if(hasDados(d.cob)) comp += ` ${d.cob}`;
    secs.push({tt:'5. Perfil Sensorial e Comportamentos Relacionados', tx:comp});
  }

  /* 6. HISTÓRICO FAMILIAR */
  let hf = '';
  if((d.hf&&d.hf.length)||hasDados(d.hfd)){
    if(d.hf&&d.hf.length) hf = `O **histórico familiar** apresenta densidade relevante para transtornos do neurodesenvolvimento e psiquiátricos, com relato de **${lista(d.hf)}** na família.`;
    else hf = 'O histórico familiar não apresenta transtornos psiquiátricos ou do neurodesenvolvimento relatados.';
    if(hasDados(d.hfd)) hf += ` ${d.hfd}`;
    secs.push({tt:'6. Histórico Familiar', tx:hf});
  }

  /* 7. INTERVENÇÕES */
  let interv = '';
  const temInterv = hasDados(d.med2)||hasDados(d.mdt)||(d.int&&d.int.length)||hasDados(d.dxs);
  if(temInterv){
    interv = `Em relação ao **histórico de intervenções e tratamentos**:`;
    if(d.med2==='Sim — psicotrópicos'||d.med2==='Sim — outros') interv += ` ${nm} faz uso atual de medicamentos${hasDados(d.mdt)?': '+d.mdt+'.':'.'}`;
    else interv += ` ${nm} não faz uso de medicamentos no momento.`;
    if(d.int&&d.int.length) interv += ` As seguintes intervenções terapêuticas estão em andamento: **${lista(d.int)}**.`;
    if(hasDados(d.dxs)) interv += ` Diagnósticos e exames anteriores: ${d.dxs}`;
    secs.push({tt:'7. Histórico de Intervenções, Tratamentos e Acompanhamentos', tx:interv});
  }

  if(hasDados(d.add)) secs.push({tt:'8. Informações Complementares', tx:d.add});

  return secs;
}

function gerarTextoIdoso(d){
  const nm=nome(d),nmA=nomeArt(d),lg=lo(d);
  const secs=[];

  /* 1. DEMANDA */
  let dem=`A avaliação neuropsicológica ${nmA}`;
  if(hasDados(d.ava)) dem+=`, realizada em ${fmtDate(d.ava)},`;
  dem+=' tem por objetivo investigar o seguinte quadro: ';
  dem+=hasDados(d.mot)?d.mot:'queixas cognitivas e/ou comportamentais a serem detalhadas na entrevista.';
  if(hasDados(d.tmq)) dem+=` As dificuldades estão presentes **${d.tmq.toLowerCase()}**.`;
  if(hasDados(d.qmp)) dem+=` A identificação inicial das queixas foi realizada por **${d.qmp.toLowerCase()}**.`;
  if(hasDados(d.prg)) dem+=` A progressão do quadro é descrita como **${d.prg.toLowerCase()}**, dado de alta relevância para o raciocínio diagnóstico diferencial.`;
  if(hasDados(d.imp)) dem+=` O impacto na vida diária é descrito da seguinte forma: ${d.imp}`;
  secs.push({tt:'1. Descrição da Demanda',tx:dem});

  /* 2. SAÚDE GERAL */
  const temSaude=(d.dcs&&d.dcs.length)||hasDados(d.cdt)||hasDados(d.mds)||hasDados(d.bnz)||(d.exc&&d.exc.length)||hasDados(d.exd);
  if(temSaude){
    let sau=`O **histórico de saúde clínica** ${nmA} é marcado por`;
    if(d.dcs&&d.dcs.length) sau+=` diagnóstico de **${lista(d.dcs)}**.`;
    else sau+=' ausência de comorbidades clínicas relatadas de forma sistemática.';
    if(hasDados(d.cdt)) sau+=` ${d.cdt}`;
    if(hasDados(d.mds)) sau+=` Em relação à **polifarmácia**, faz uso de: ${d.mds}`;
    if(hasDados(d.bnz)&&d.bnz!=='Não usa') sau+=` **Uso de benzodiazepínicos**: ${d.bnz.toLowerCase()}, dado clinicamente relevante pelo impacto potencial no desempenho cognitivo.`;
    if(d.exc&&d.exc.length) sau+=` Foram realizados os seguintes exames neurológicos: **${lista(d.exc)}**.`;
    if(hasDados(d.exd)) sau+=` Resultados: ${d.exd}`;
    secs.push({tt:'2. Histórico de Saúde Geral e Fatores de Risco',tx:sau});
  }

  /* 3. QUEIXAS COGNITIVAS */
  const temCog=(d.qmm&&d.qmm.length)||(d.qln&&d.qln.length)||(d.qex&&d.qex.length)||hasDados(d.cob);
  if(temCog){
    let cog=`O **perfil das queixas cognitivas** ${nmA} abrange`;
    const dominios=[];
    if(d.qmm&&d.qmm.length) dominios.push(`**domínio mnéstico**: ${lista(d.qmm).toLowerCase()}`);
    if(d.qln&&d.qln.length) dominios.push(`**domínio da linguagem**: ${lista(d.qln).toLowerCase()}`);
    if(d.qex&&d.qex.length) dominios.push(`**funções executivas e orientação**: ${lista(d.qex).toLowerCase()}`);
    if(dominios.length) cog+=` os seguintes domínios: ${lista(dominios)}.`;
    else cog+=' queixas a serem avaliadas instrumentalmente.';
    if(hasDados(d.cob)) cog+=` ${d.cob}`;
    secs.push({tt:'3. Perfil das Queixas Cognitivas',tx:cog});
  }

  /* 4. AVDs */
  if((d.avb&&d.avb.length)||(d.avi&&d.avi.length)||hasDados(d.dep)||hasDados(d.phb)){
    let avd=`Em relação à **autonomia e às atividades de vida diária**:`;
    if(d.avb&&d.avb.length) avd+=` as seguintes AVDs básicas encontram-se preservadas: **${lista(d.avb)}**.`;
    if(d.avi&&d.avi.length) avd+=` As seguintes AVDs instrumentais encontram-se preservadas: **${lista(d.avi)}**.`;
    if(hasDados(d.dep)) avd+=` O grau de dependência atual é descrito como **${d.dep.toLowerCase()}**.`;
    if(hasDados(d.phb)) avd+=` Perdas funcionais recentes relatadas: ${d.phb}`;
    secs.push({tt:'4. Autonomia e Atividades de Vida Diária',tx:avd});
  }

  /* 5. NEUROPSIQUIÁTRICO */
  if((d.nps&&d.nps.length)||hasDados(d.pqa)||hasDados(d.son)){
    let nps=`O **perfil neuropsiquiátrico** ${nmA}`;
    if(d.nps&&d.nps.length) nps+=` é caracterizado pela presença de: **${lista(d.nps)}**.`;
    else nps+=' não apresenta sintomas neuropsiquiátricos relatados de forma sistemática.';
    if(hasDados(d.son)&&d.son!=='Normal para a idade') nps+=` O padrão de sono apresenta **${d.son.toLowerCase()}**, dado com relevância para o diagnóstico diferencial.`;
    if(hasDados(d.pqa)) nps+=` **Histórico psiquiátrico prévio**: ${d.pqa}`;
    secs.push({tt:'5. Perfil Neuropsiquiátrico',tx:nps});
  }

  /* 6. RESERVA COGNITIVA */
  const temRes=hasDados(d.atf)||hasDados(d.atc)||hasDados(d.vds)||hasDados(d.trj)||hasDados(d.evv);
  if(temRes){
    let res=`Os **fatores de reserva cognitiva** ${nmA}`;
    const frs=[];
    if(hasDados(d.esc)) frs.push(`escolaridade: **${d.esc.toLowerCase()}**${hasDados(d.ano)?' ('+d.ano+' anos de estudo)':''}`);
    if(hasDados(d.atf)) frs.push(`atividade física: **${d.atf.toLowerCase()}**`);
    if(hasDados(d.atc)) frs.push(`estimulação cognitiva: **${d.atc.toLowerCase()}**`);
    if(hasDados(d.vds)) frs.push(`vida social: **${d.vds.toLowerCase()}**`);
    if(frs.length) res+=` incluem: ${lista(frs)}.`;
    else res+=' não foram detalhados de forma sistemática.';
    if(hasDados(d.trj)) res+=` **Trajetória profissional**: ${d.trj}`;
    if(hasDados(d.evv)) res+=` **Eventos de vida recentes**: ${d.evv}`;
    secs.push({tt:'6. Reserva Cognitiva e Estilo de Vida',tx:res});
  }

  /* 7. FAMILIAR */
  if(d.hf&&d.hf.length){
    let hf=`O **histórico familiar** apresenta densidade relevante para: **${lista(d.hf)}**.`;
    if(hasDados(d.hfd)) hf+=` ${d.hfd}`;
    secs.push({tt:'7. Histórico Familiar',tx:hf});
  }

  if(hasDados(d.dxs)) secs.push({tt:'8. Diagnósticos Estabelecidos',tx:d.dxs});
  if(hasDados(d.add)) secs.push({tt:'9. Informações Complementares',tx:d.add});
  return secs;
}

function gerarTexto(k,d){
  if(k==='infantil') return gerarTextoInfantil(d);
  if(k==='escolar') return gerarTextoEscolar(d);
  if(k==='adolescente') return gerarTextoAdolescente(d);
  if(k==='adulto') return gerarTextoAdulto(d);
  if(k==='idoso') return gerarTextoIdoso(d);
  return [];
}

function rField(f,k,si,fi){
  const id=fId(k,si,fi),full=f.full?'fg-full':'',req=f.req?'<span class="req">*</span>':'';
  if(f.tp==='cks'){const its=f.its.map((it,ii)=>`<div class="ck"><input type="checkbox" id="${fId(k,si,fi,ii)}"><span>${it}</span></div>`).join('');return`<div class="fg ${full}"><label>${f.lb}</label><div class="cks">${its}</div></div>`;}
  if(f.tp==='ta') return`<div class="fg ${full}"><label>${f.lb}${req}</label><textarea id="${id}" placeholder="${f.ph||''}"></textarea></div>`;
  if(f.tp==='sel'){const ops=['<option value="">Selecione...</option>',...(f.op||[]).map(o=>`<option>${o}</option>`)].join('');return`<div class="fg ${full}"><label>${f.lb}${req}</label><select id="${id}">${ops}</select></div>`;}
  if(f.tp==='num') return`<div class="fg ${full}"><label>${f.lb}${req}</label><input type="number" id="${id}" placeholder="${f.ph||''}" min="${f.mn??''}" max="${f.mx??''}"></div>`;
  return`<div class="fg ${full}"><label>${f.lb}${req}</label><input type="${f.tp||'text'}" id="${id}" placeholder="${f.ph||''}"></div>`;
}
function rSect(s,k,si){
  const gc=s.g3?'fg-grid3':'fg-grid';
  return`<div class="card-sm"><div class="sect-head"><div class="sect-ic">${s.ic}</div><span class="sect-tt">${s.tt}</span></div><div class="${gc}">${(s.g2||s.g3||[]).map((f,fi)=>rField(f,k,si,fi)).join('')}</div></div>`;
}
function rForm(k){
  const fx=F[k];
  return`<div class="badge">${fx.icon} ${fx.tt} · ${fx.rg}</div>
  <div style="background:white;border-radius:16px;border:1.5px solid #e2e8f0;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:12px;color:#64748b;font-weight:600">${fx.sects.length} seções clínicas</span>
    <span style="font-size:12px;color:#0d9488;font-weight:700">Preencha os campos relevantes</span>
  </div>
  ${fx.sects.map((s,si)=>rSect(s,k,si)).join('')}
  <div class="acts">
    <button class="btn-main" onclick="gerar('${k}')">📋 Gerar Texto de Anamnese</button>
    <button class="btn-sec" onclick="goSel()">← Voltar</button>
  </div>`;
}

  <style>body{font-family:Arial,sans-serif;max-width:800px;margin:0 auto;padding:32px}</style></head><body>
  <div style="background:#0d9488;padding:24px 28px;border-radius:12px;color:white;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px">
    <div><div style="font-size:16px;font-weight:800">Equilibrium Neuropsicologia</div><div style="font-size:10px;opacity:.85">CRP 04/53832 — Wessilon Marques de Sousa</div></div>
    <div style="text-align:right"><div style="font-size:18px;font-weight:800">Entrevista de Anamnese</div><div style="font-size:11px;opacity:.85">${d.faixa}</div></div>
  </div>
  <h2 style="font-size:13px;font-weight:800;color:#0f766e;text-transform:uppercase;letter-spacing:.06em;margin:0 0 10px;padding-bottom:6px;border-bottom:2px solid #f0fdfa">Dados de Identificação</h2>
  <table style="width:100%;border-collapse:collapse;background:#f8fafc;border-radius:10px;margin-bottom:24px">${metaRows}</table>
  ${secHtml}
  <div style="margin-top:32px;padding-top:16px;border-top:2px solid #f1f5f9;text-align:center;font-size:11px;color:#94a3b8">
    <p>Gerado por <strong>Equilibrium Neuropsicologia</strong> — CRP 04/53832 — Wessilon Marques de Sousa</p>
    <p>Documento confidencial — destinado exclusivamente ao paciente e profissionais autorizados</p>
  </div>
  </body></html>`;
}

function render(){
  const m=document.getElementById('main'),pt=document.getElementById('pt'),ps=document.getElementById('ps');
  if(state==='select'){
    pt.textContent='Entrevista de Anamnese';
    ps.textContent='Selecione a faixa etária para iniciar';
    const cards=Object.entries(F).map(([k,fx])=>`<div class="fc" id="fc-${k}" onclick="goForm('${k}')"><div class="fc-ic">${fx.icon}</div><div class="fc-tt">${fx.tt}</div><div class="fc-rg">${fx.rg}</div></div>`).join('');
    m.innerHTML=`
    <div class="card"><div class="sect-head"><div class="sect-ic">🎯</div><span class="sect-tt">Selecione a faixa etária</span></div><div class="faixa-grid">${cards}</div></div>`;
  } else if(state==='form'){
    const fx=F[fk];
    pt.textContent=`Anamnese — ${fx.tt}`;
    ps.textContent=`${fx.rg} · Preencha os campos clínicos relevantes`;
    m.innerHTML=rForm(fk);
    F[fk].sects.forEach((s,si)=>{(s.g2||s.g3||[]).forEach((f,fi)=>{if(f.today){const e=document.getElementById(fId(fk,si,fi));if(e)e.value=hoje;}});});
  } else if(state==='loading'){
    pt.textContent='Enviando para o Drive...';
    ps.textContent='Por favor, aguarde';
    m.innerHTML=`
    <div class="card" style="text-align:center;padding:64px 24px">
      <div style="width:56px;height:56px;border:4px solid #e2e8f0;border-top-color:#0d9488;border-radius:50%;margin:0 auto 24px;animation:spin .8s linear infinite"></div>
      <div style="font-size:20px;font-weight:800;color:#0f172a;margin-bottom:8px">Salvando anamnese no Drive...</div>
      <div style="font-size:13px;color:#64748b" id="loading_msg">Montando o documento clínico</div>
    </div>`;
  } else if(state==='sucesso'){
    pt.textContent='Anamnese enviada!';
    ps.textContent='O documento foi salvo com sucesso no Google Drive';
    const driveUrl = saved && saved.url ? saved.url : '';
    m.innerHTML=`
    <div class="card" style="text-align:center;padding:64px 24px">
      <div style="width:64px;height:64px;background:#f0fdfa;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px">✅</div>
      <div style="font-size:22px;font-weight:800;color:#0f172a;margin-bottom:8px">Documento salvo com sucesso!</div>
      <div style="font-size:14px;color:#64748b;margin-bottom:28px">A anamnese de <strong>${saved._d.nom||'paciente'}</strong> foi salva no Google Drive.</div>
      ${driveUrl ? `<a href="${driveUrl}" target="_blank" style="display:inline-block;padding:12px 24px;background:#0d9488;color:white;border-radius:14px;font-weight:700;font-size:14px;text-decoration:none;margin-bottom:16px">📄 Abrir no Drive</a><br>` : ''}
      <div style="display:flex;gap:10px;justify-content:center;margin-top:16px">
        <button class="btn-main" onclick="goForm('${fk}')">← Editar e reenviar</button>
        <button class="btn-sec" onclick="goSel()">Nova anamnese</button>
      </div>
    </div>`;
  } else if(state==='erro'){
    pt.textContent='Erro no envio';
    ps.textContent='Não foi possível salvar no Drive';
    m.innerHTML=`
    <div class="card" style="text-align:center;padding:64px 24px">
      <div style="width:64px;height:64px;background:#fef2f2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px">❌</div>
      <div style="font-size:20px;font-weight:800;color:#0f172a;margin-bottom:8px">Erro ao enviar</div>
      <div style="font-size:13px;color:#64748b;margin-bottom:8px">${saved._erro||'Verifique a URL do Apps Script e tente novamente.'}</div>
      <div style="font-size:12px;color:#94a3b8;margin-bottom:28px">Certifique-se de que o Apps Script está implantado como <strong>Aplicativo Web</strong> com acesso <strong>Qualquer pessoa</strong>.</div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn-main" onclick="goForm('${fk}')">← Voltar e tentar novamente</button>
        <button class="btn-sec" onclick="goSel()">Configurações</button>
      </div>
    </div>`;
  }
}


function goSel(){state='select';fk=null;render();}
function goForm(k){state='form';fk=k;render();}

async function gerar(k){
  const d=coletarDados(k);
  if(!d.nom){alert('Por favor, preencha o nome do paciente.');return;}

  const url=APPS_SCRIPT_URL;
  if(!url||url==='COLE_AQUI_A_URL_DO_APPS_SCRIPT'){
    alert('Configure a URL do Apps Script diretamente no código HTML antes de usar (variável APPS_SCRIPT_URL).');
    return;
  }

  const secs=gerarTexto(k,d);
  if(!secs.length){alert('Preencha ao menos os campos obrigatórios.');return;}

  fk=k; saved={_d:d,_secs:secs}; state='loading'; render();

  // Muda mensagem após 1s
  setTimeout(()=>{const e=document.getElementById('loading_msg');if(e)e.textContent='Enviando para o Google Drive...';},1000);

  try{
    const htmlDoc = montarHTMLDoc(d, secs);

    const payload = {
      nomePaciente: d.nom,
      dataAvaliacao: fmtDate(d.ava),
      faixaEtaria: d.faixa,
      medicoSolicitante: d.med||'',
      htmlConteudo: htmlDoc,
      secoes: secs.map(s=>({
        titulo: s.tt,
        texto: s.tx.replace(/\*\*(.*?)\*\*/g,'$1')
      }))
    };

    // Usa text/plain para evitar CORS preflight no Google Apps Script
    await fetch(url, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify(payload)
    });

    // Com no-cors não conseguimos ler a resposta (opaque),
    // mas o Apps Script recebe e processa normalmente
    state='sucesso'; render();

  } catch(err){
    saved._erro = 'Erro de conexão: '+err.message+'. Verifique se a URL do Apps Script está correta e se o script está implantado como Aplicativo Web com acesso "Qualquer pessoa".';
    state='erro'; render();
  }
}

render();
</script>
