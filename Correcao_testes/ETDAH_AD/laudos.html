<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Laudos ETDAH-AD | Equilibrium</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar no-print">
      <div class="sidebar-brand">
        <img src="/logo2.png" alt="Logo" class="sidebar-logo" onerror="this.style.display='none'" />
        <div>
          <div class="brand-name">Equilibrium</div>
          <div class="brand-sub">Neuropsicologia</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item" href="/" data-page="dashboard"><span class="nav-icon">📊</span><span>Dashboard</span></a>
        <a class="nav-item" href="/Pacientes/" data-page="pacientes"><span class="nav-icon">👤</span><span>Pacientes</span></a>
        <a class="nav-item" href="/Correcao_testes/" data-page="correcao"><span class="nav-icon">✏️</span><span>Correção de Testes</span></a>
        <a class="nav-item" href="/Aplicacao_testes/" data-page="aplicacao"><span class="nav-icon">🧠</span><span>Aplicação de Testes</span></a>
        <a class="nav-item" href="/Anamnese/" data-page="anamnese"><span class="nav-icon">📋</span><span>Anamnese</span></a>
        <a class="nav-item" href="/#relatorios" data-page="relatorios"><span class="nav-icon">📄</span><span>Relatórios</span></a>
        <a class="nav-item" href="/check_list/" data-page="checklist"><span class="nav-icon">✅</span><span>Checklist</span></a>
        <a class="nav-item" href="/Config/" data-page="config"><span class="nav-icon">⚙️</span><span>Configurações</span></a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">?</div>
          <div>
            <div class="user-name">Carregando...</div>
            <div class="user-role">—</div>
          </div>
        </div>
        <button class="btn-logout" onclick="doLogout()">Sair</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <div>
          <p class="page-subtitle">
            <a href="/Correcao_testes/" class="breadcrumb">Correção</a> →
            <a href="/Correcao_testes/ETDAH_AD/" class="breadcrumb">ETDAH-AD</a> → Laudos Salvos
          </p>
          <h1 class="page-title">Laudos Salvos — ETDAH-AD</h1>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn-primary" onclick="location.href='/Correcao_testes/ETDAH_AD/novo-laudo.html'">+ Novo Laudo</button>
          <button class="btn-secondary" onclick="history.back()">← Voltar</button>
        </div>
      </div>

      <!-- Busca -->
      <div class="card" style="margin-bottom:16px;">
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
          <input
            type="text" id="busca"
            placeholder="Buscar por nome, CPF ou data…"
            oninput="filtrar()"
            style="flex:1;min-width:220px;padding:10px 14px;border-radius:10px;border:1px solid var(--border);font-size:14px;font-family:inherit;outline:none;"
          />
          <button class="btn-secondary" onclick="limparBusca()">Limpar</button>
          <button class="btn-secondary" style="color:#dc2626;" onclick="limparTodos()">🗑 Limpar todos</button>
        </div>
      </div>

      <!-- Lista -->
      <div id="listaLaudos"></div>

      <!-- Modal de detalhe -->
      <div id="modalOverlay" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(4px);z-index:9999;overflow-y:auto;">
        <div style="max-width:860px;margin:40px auto;padding:20px;">
          <div id="modalConteudo" style="background:#fff;border-radius:16px;padding:32px;box-shadow:0 24px 60px rgba(0,0,0,.18);"></div>
          <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px;">
            <button class="btn-primary" onclick="gerarPDFModal()">⬇ Exportar PDF</button>
            <button class="btn-secondary" onclick="fecharModal()">✕ Fechar</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/patient-guard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="/Correcao_testes/ETDAH_AD/script.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      if (window.FIREBASE_CONFIGURED && window.DB) await DB.init();
      if (!isAuthed()) {
        location.href = '/login.html';
      } else {
        applySidebarPermissions();
        renderLista();
      }
    });

    const LAUDOS_KEY = "empresa_laudos_etdah_ad";
    let laudoAtual = null;

    function getLaudos() { return JSON.parse(localStorage.getItem(LAUDOS_KEY) || "[]"); }
    function setLaudos(arr) { localStorage.setItem(LAUDOS_KEY, JSON.stringify(arr)); }

    function formatarData(iso) {
      if (!iso) return "—";
      const [y, m, d] = iso.split("-");
      return `${d}/${m}/${y}`;
    }

    const COR_CLASS = {
      "Superior":        { bg: "#D5F5E3", txt: "#006100" },
      "Médio Superior":  { bg: "#D6EAF8", txt: "#1F3864" },
      "Médio":           { bg: "#FFF2CC", txt: "#BF8F00" },
      "Médio Inferior":  { bg: "#FFC7CE", txt: "#9C0006" },
      "Inferior":        { bg: "#FFC7CE", txt: "#9C0006" },
      "—":               { bg: "#f8fafc", txt: "#94a3b8" },
    };

    const FATORES = ["Desatenção", "Hiperatividade", "Impulsividade", "Aspectos Emocionais", "AAMA"];

    function renderLista(filtro = "") {
      const lista = getLaudos();
      const container = document.getElementById("listaLaudos");
      const termo = filtro.toLowerCase();

      const filtrados = lista.filter(l => {
        const nome = (l.nome || "").toLowerCase();
        const cpf  = (l.cpf  || "").toLowerCase();
        const data = formatarData(l.dataAplicacao);
        return !termo || nome.includes(termo) || cpf.includes(termo) || data.includes(termo);
      });

      if (filtrados.length === 0) {
        container.innerHTML = `
          <div class="card" style="text-align:center;padding:40px;color:var(--text-secondary);">
            <div style="font-size:32px;margin-bottom:12px;">📋</div>
            <div style="font-size:15px;font-weight:600;">${lista.length === 0 ? "Nenhum laudo salvo ainda." : "Nenhum laudo encontrado."}</div>
          </div>`;
        return;
      }

      container.innerHTML = filtrados.map((l, idx) => {
        const res = l.resultados || {};
        const chips = FATORES.map(f => {
          const r = res[f];
          if (!r) return "";
          const cc = COR_CLASS[r.classificacao] || COR_CLASS["—"];
          return `<span style="background:${cc.bg};color:${cc.txt};padding:2px 8px;border-radius:14px;font-size:10.5px;font-weight:700;">${f}: ${r.classificacao}</span>`;
        }).join(" ");

        return `
          <div class="card" style="margin-bottom:12px;">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;">
              <div>
                <div style="font-size:15px;font-weight:700;color:#1e293b;">${l.nome || "—"}</div>
                <div style="font-size:12px;color:#64748b;margin-top:2px;">
                  ${formatarData(l.dataAplicacao)} · ${l.escolaridade || "—"} · ${l.idadeTxt || "—"}
                </div>
                <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px;">${chips}</div>
              </div>
              <div style="display:flex;gap:8px;flex-shrink:0;">
                <button class="btn-primary" style="font-size:12px;padding:6px 14px;" onclick='abrirLaudo(${JSON.stringify(l).replace(/'/g, "&#39;")})'>Ver laudo</button>
                <button class="btn-secondary" style="font-size:12px;padding:6px 14px;color:#dc2626;" onclick="excluirLaudo('${l.id}')">Excluir</button>
              </div>
            </div>
          </div>`;
      }).join("");
    }

    function filtrar() {
      const t = document.getElementById("busca").value;
      renderLista(t);
    }

    function limparBusca() {
      document.getElementById("busca").value = "";
      renderLista();
    }

    function limparTodos() {
      if (!confirm("Isso apagará TODOS os laudos salvos localmente. Confirma?")) return;
      setLaudos([]);
      renderLista();
    }

    function excluirLaudo(id) {
      if (!confirm("Excluir este laudo?")) return;
      const lista = getLaudos().filter(l => l.id !== id);
      setLaudos(lista);
      renderLista(document.getElementById("busca").value);
    }

    function abrirLaudo(laudo) {
      laudoAtual = laudo;
      const modal = document.getElementById("modalOverlay");
      const conteudo = document.getElementById("modalConteudo");

      // Reutiliza a função renderRelatorio do script.js
      // Mas renderiza dentro do modal
      const divTemp = document.createElement("div");
      divTemp.id = "relatorio";
      divTemp.style.display = "none";
      document.body.appendChild(divTemp);

      const relOriginal = document.getElementById("relatorio");
      const idReal = "relatorio";

      // Temporariamente redireciona
      divTemp.id = "relatorio_temp_" + Date.now();
      conteudo.innerHTML = "";
      conteudo.id = "relatorio";
      renderRelatorio(laudo);
      conteudo.id = "modalConteudo";

      divTemp.remove();
      modal.style.display = "block";
      document.body.style.overflow = "hidden";
    }

    function fecharModal() {
      document.getElementById("modalOverlay").style.display = "none";
      document.body.style.overflow = "";
      laudoAtual = null;
    }

    async function gerarPDFModal() {
      if (!laudoAtual) return;
      const el = document.getElementById("modalConteudo");
      if (!el || typeof html2pdf === "undefined") return;
      const nome = laudoAtual.nome || "avaliado";
      const data = (laudoAtual.dataAplicacao || "").replace(/-/g, "");
      const nomeArq = `ETDAH-AD_${nome.replace(/\s+/g, "_")}_${data}.pdf`;
      const opt = {
        margin: [14,14,14,14],
        filename: nomeArq,
        image: { type: "jpeg", quality: 0.96 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
        pagebreak: { mode: ["avoid-all","css","legacy"] },
      };
      await html2pdf().set(opt).from(el).save();
    }

    // Fechar modal ao clicar fora
    document.getElementById("modalOverlay").addEventListener("click", function(e) {
      if (e.target === this) fecharModal();
    });
  </script>
</body>
</html>
