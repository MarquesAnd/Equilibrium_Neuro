<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Laudos WISC-IV | Equilibrium</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar no-print">
      <div class="sidebar-brand">
        <img src="/logo2.png" alt="Logo" class="sidebar-logo" onerror="this.style.display='none'" />
        <div><div class="brand-name">Equilibrium</div><div class="brand-sub">Neuropsicologia</div></div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item" href="/"><span class="nav-icon">📊</span><span>Dashboard</span></a>
        <a class="nav-item" href="/#pacientes"><span class="nav-icon">👤</span><span>Pacientes</span></a>
        <a class="nav-item active" href="/Correcao_testes/"><span class="nav-icon">✏️</span><span>Correção de Testes</span></a>
        <a class="nav-item" href="/Aplicacao_testes/"><span class="nav-icon">🧠</span><span>Aplicação de Testes</span></a>
        <a class="nav-item" href="/#relatorios"><span class="nav-icon">📄</span><span>Relatórios</span></a>
        <a class="nav-item" href="/check_list/"><span class="nav-icon">✅</span><span>Checklist</span></a>
        <a class="nav-item" href="/#config"><span class="nav-icon">⚙️</span><span>Configurações</span></a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info"><div class="user-avatar">W</div><div><div class="user-name">Wessilon</div><div class="user-role">Profissional</div></div></div>
        <button class="btn-logout" onclick="doLogout()">Sair</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <div>
          <p class="page-subtitle"><a href="/Correcao_testes/" class="breadcrumb">Correção</a> → <a href="/Correcao_testes/WISC_IV/" class="breadcrumb">WISC-IV</a> → Laudos</p>
          <h1 class="page-title">Laudos Salvos — WISC-IV</h1>
        </div>
        <div>
          <button class="btn-primary" onclick="location.href='/Correcao_testes/WISC_IV/novo-laudo.html'">+ Novo Laudo</button>
          <button class="btn-secondary" onclick="history.back()">← Voltar</button>
        </div>
      </div>

      <div class="card">
        <div id="listaLaudos">
          <div class="empty-state">
            <div class="empty-icon">📄</div>
            <div class="empty-title">Carregando laudos...</div>
          </div>
        </div>
      </div>
    </main>
  </div>

    <!-- SDKs do Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- Configurações do Sistema -->
<script src="/js/firebase-config.js"></script>
<script src="/js/db.js"></script>
<script src="/js/auth.js"></script>


  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      // 1. Acorda o Firebase primeiro e ESPERA
      if (window.FIREBASE_CONFIGURED && window.DB) {
        await DB.init();
      }
      
      // 2. Agora sim, com o Firebase acordado, verifica se está logado
      if (!isAuthed()) {
        location.href = '/login.html'; // Ajuste o caminho se a pasta login estiver em outro nível
      }
      
      // Bônus: Se você quiser injetar os dados do usuário na sidebar dessa página também:
      const user = getAuthUser();
      if (user) {
        document.querySelector(".user-name").textContent = user.label;
        document.querySelector(".user-avatar").textContent = user.label[0].toUpperCase();
      }
    });
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="/Correcao_testes/WISC_IV/script.js"></script>
</body>
</html>
